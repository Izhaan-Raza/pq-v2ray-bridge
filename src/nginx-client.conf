events {
    worker_connections 1024;
}

http {
    server {
        listen 4433;
        
        location / {
            # The installer injects the Tailscale IP here
            proxy_pass https://SERVER_IP_PLACEHOLDER:4433;
            
            # Use Post-Quantum TLS
            proxy_ssl_protocols TLSv1.3;
            proxy_ssl_trusted_certificate /opt/nginx/certs/falcon512.crt;
            
            # WebSocket Upgrade Headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
