events {
    worker_connections 1024;
}

http {
    server {
        listen 4433 ssl;
        ssl_protocols TLSv1.3;
        
        # OQS Post-Quantum Keys
        ssl_certificate /opt/nginx/certs/falcon512.crt;
        ssl_certificate_key /opt/nginx/certs/falcon512.key;
        
        location / {
            # Route to the V2Ray host bridge
            proxy_pass http://172.17.0.1:443;
            
            # WebSocket Upgrade Headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
